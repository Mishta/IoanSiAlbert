<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
<defs>
  <radialGradient id="bg" cx="50%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#0d1b2e"/><stop offset="100%" stop-color="#070b14"/>
  </radialGradient>
  <radialGradient id="earthSphere" cx="42%" cy="38%" r="58%">
    <stop offset="0%" stop-color="#1a3a5c"/><stop offset="55%" stop-color="#0e2844"/><stop offset="100%" stop-color="#05111f"/>
  </radialGradient>
  <radialGradient id="hubN" cx="50%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#b8860b"/>
  </radialGradient>
  <radialGradient id="hubS" cx="50%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#b8860b"/>
  </radialGradient>
  <filter id="g3" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g6" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g12" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="earthShadow">
    <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#4fc3f7" flood-opacity="0.22"/>
  </filter>
  <clipPath id="ec"><circle cx="590" cy="405" r="236"/></clipPath>
</defs>

<!-- Background -->
<rect width="1200" height="800" fill="url(#bg)"/>
